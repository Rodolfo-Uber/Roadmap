<script>
  var MI = {JAN:0,FEV:1,MAR:2,ABR:3,MAI:4,JUN:5,JUL:6,AGO:7,SET:8,OUT:9,NOV:10,DEZ:11};
  var IC = {done:"✅",in_progress:"▶",waiting:"⏳",idea:"💡"};
  var LB = {done:"Concluído",in_progress:"Em andamento",waiting:"Aguardando recurso",idea:"Aspiração / Ideia"};
  var fk = null;

  function layout(items) {
    var tr=[],pl=[];
    for(var i=0;i<items.length;i++){
      var it=items[i],s=MI[it.startMonth],e=MI[it.endMonth],t=-1;
      for(var a=0;a<tr.length;a++){
        var ok=true;
        for(var b=0;b<tr[a].length;b++){if(!(e<tr[a][b].s||s>tr[a][b].e)){ok=false;break;}}
        if(ok){t=a;break;}
      }
      if(t<0){t=tr.length;tr.push([]);}
      tr[t].push({s:s,e:e});
      pl.push({it:it,t:t,s:s,e:e});
    }
    return{pl:pl,rows:tr.length};
  }

  function renderPage(){
    var H=30,P=4,h="";
    h+='<div class="ph"><div class="ph-title">'+DATA.meta.title+'</div><div class="ph-sub">'+DATA.meta.subtitle+'</div></div>';
    h+='<div class="row qh"><div class="lc">Produto</div><div class="qa">';
    for(var q=0;q<DATA.quarters.length;q++) h+='<div class="qc">'+DATA.quarters[q].name+'</div>';
    h+='</div></div>';
    h+='<div class="row mh"><div class="lc"></div><div class="ma">';
    for(var m=0;m<DATA.months.length;m++) h+='<div class="mc">'+DATA.months[m]+'</div>';
    h+='</div></div>';

    for(var ci=0;ci<DATA.categories.length;ci++){
      var cat=DATA.categories[ci];
      h+='<div class="row"><div class="cat-lbl">'+cat.name+'</div></div>';
      for(var pi=0;pi<cat.products.length;pi++){
        var pr=cat.products[pi],vis=[];
        for(var ii=0;ii<pr.items.length;ii++) if(pr.items[ii].status!=="idea") vis.push(pr.items[ii]);
        var lo=layout(vis),tlH=lo.rows>0?lo.rows*H+P*2:H+P;
        h+='<div class="row pr"><div class="pn">'+pr.name+'</div><div class="tl" style="height:'+tlH+'px">';
        for(var ml=1;ml<12;ml++) h+='<div class="ml" style="left:'+(ml/12*100).toFixed(1)+'%"></div>';
        for(var li=0;li<lo.pl.length;li++){
          var p=lo.pl[li],soff=p.it.startOffset!==undefined?p.it.startOffset:0,off=p.it.endOffset!==undefined?p.it.endOffset:1;
          var l=((p.s+soff)/12*100).toFixed(2),w=((p.e-p.s+off-soff)/12*100).toFixed(2),top=P+p.t*H+2;
          h+='<div class="it s-'+p.it.status+'" style="left:'+l+'%;width:calc('+w+'% - 3px);top:'+top+'px"';
          h+=' onclick="openI(\''+cat.id+'\',\''+pr.id+'\',\''+p.it.id+'\')">';
          h+='<span>'+(IC[p.it.status]||'')+'</span><span style="overflow:hidden;text-overflow:ellipsis">'+p.it.name+'</span></div>';
        }
        h+='</div></div>';
      }
    }
    h+='<div class="legend"><div class="li"><div class="ld" style="background:#5A8F6B"></div> Concluído</div>';
    h+='<div class="li"><div class="ld" style="background:#4A7EC8"></div> Em andamento</div>';
    h+='<div class="li"><div class="ld" style="background:#E8916A"></div> Aguardando recurso</div></div>';
    document.getElementById("pg").innerHTML=h;
  }

  function renderSb(){
    var cats=[],hasAny=false;
    for(var ci=0;ci<DATA.categories.length;ci++){
      var cat=DATA.categories[ci],items=[];
      for(var pi=0;pi<cat.products.length;pi++){
        var pr=cat.products[pi];
        for(var ii=0;ii<pr.items.length;ii++){
          if(pr.items[ii].status==="idea") items.push({it:pr.items[ii],cat:cat,pr:pr});
        }
      }
      if(items.length){cats.push({cat:cat,items:items});hasAny=true;}
    }
    if(!hasAny){document.getElementById("sb").innerHTML="";return;}
    var h='<div class="asp-head">💡 Aspirações</div>';
    for(var ci2=0;ci2<cats.length;ci2++){
      var g=cats[ci2];
      h+='<div class="asp-cat"><div class="asp-cn">'+g.cat.name+'</div><div class="asp-items">';
      for(var ij=0;ij<g.items.length;ij++){
        var r=g.items[ij];
        h+='<div class="asp-it" onclick="openI(\''+r.cat.id+'\',\''+r.pr.id+'\',\''+r.it.id+'\')">💡 '+r.it.name+'</div>';
      }
      h+='</div></div>';
    }
    document.getElementById("sb").innerHTML=h;
  }

  function findItem(catId,prodId,itemId){
    for(var ci=0;ci<DATA.categories.length;ci++){
      if(DATA.categories[ci].id!==catId) continue;
      var cat=DATA.categories[ci];
      for(var pi=0;pi<cat.products.length;pi++){
        if(cat.products[pi].id!==prodId) continue;
        var pr=cat.products[pi];
        for(var ii=0;ii<pr.items.length;ii++){
          if(pr.items[ii].id===itemId) return{cat:cat,pr:pr,item:pr.items[ii]};
        }
      }
    }
    return null;
  }

  function openI(catId,prodId,itemId){
    var r=findItem(catId,prodId,itemId); if(!r) return;
    var cat=r.cat,pr=r.pr,item=r.item;
    document.getElementById("mt").textContent=item.name;
    document.getElementById("mbc").textContent=cat.name+" › "+pr.name;
    var b='<div class="ms"><div class="ms-t">Status</div>';
    b+='<span class="badge b-'+item.status+'">'+(IC[item.status]||"")+' '+(LB[item.status]||item.status)+'</span></div>';
    b+='<div class="ms"><div class="ms-t">Overview</div>';
    b+=(item.overview&&item.overview.trim()?'<div class="ov-txt">'+e(item.overview)+'</div>':'<div class="mt">Sem descrição ainda.</div>')+'</div>';
    b+='<div class="ms"><div class="ms-t">Features no escopo</div>';
    if(item.featuresInScope&&item.featuresInScope.length){
      b+='<ul class="fl">';
      for(var fi=0;fi<item.featuresInScope.length;fi++){
        var f=item.featuresInScope[fi],k=itemId+"__"+fi;
        var dv=lc(k,"dev",f.testDev),po=lc(k,"po",f.testPO),st=lc(k,"st",f.testStakeholder);
        b+='<li class="fi"><span class="fn">'+e(f.name)+'</span>';
        b+='<button class="fb" onclick="openF(\''+itemId+'\','+fi+',\''+e(f.name)+'\',\''+e(item.name)+'\')">🔍 Detalhes</button>';
        b+='<div class="cks">';
        b+='<label class="cl"><input type="checkbox" '+(dv?"checked":"")+'  onchange="sc(\''+k+'\',\'dev\',this.checked)"> Dev</label>';
        b+='<label class="cl"><input type="checkbox" '+(po?"checked":"")+'  onchange="sc(\''+k+'\',\'po\',this.checked)"> PO</label>';
        b+='<label class="cl"><input type="checkbox" '+(st?"checked":"")+'  onchange="sc(\''+k+'\',\'st\',this.checked)"> Stakeholder</label>';
        b+='</div></li>';
      }
      b+='</ul>';
    } else b+='<div class="mt">Nenhuma feature definida ainda.</div>';
    b+='</div><div class="ms"><div class="ms-t">Fora do escopo</div>';
    if(item.featuresOutOfScope&&item.featuresOutOfScope.length){
      b+='<ul class="ool">';
      for(var oi=0;oi<item.featuresOutOfScope.length;oi++) b+='<li class="ooi">'+e(item.featuresOutOfScope[oi])+'</li>';
      b+='</ul>';
    } else b+='<div class="mt">Nenhum item fora do escopo.</div>';
    b+='</div>';
    document.getElementById("mb").innerHTML=b;
    document.getElementById("iov").classList.add("open");
  }

  function closeI(){document.getElementById("iov").classList.remove("open");}
  document.getElementById("iov").addEventListener("click",function(e){if(e.target.id==="iov")closeI();});

  function openF(itemId,idx,featName,itemName){
    fk="feat__"+itemId+"__"+idx;
    document.getElementById("ft").textContent=featName;
    document.getElementById("fs").textContent="Parte de: "+itemName;
    var sh=localStorage.getItem(fk+"__html")||"",sf=localStorage.getItem(fk+"__flow")||"";
    document.getElementById("mc").value=sh; upPrev(sh);
    document.getElementById("fi").value=sf; rnFlow(sf);
    document.getElementById("fov").classList.add("open");
  }
  function closeF(){
    document.getElementById("fov").classList.remove("open");
    document.getElementById("fm").classList.remove("expanded");
    document.getElementById("exp-btn").textContent="⛶ Expandir";
    fk=null;
  }
  function toggleAcc(id){document.getElementById(id).classList.toggle("closed");}
  function toggleExp(ev){
    ev.stopPropagation();
    var fm=document.getElementById("fm"),btn=document.getElementById("exp-btn");
    if(fm.classList.contains("expanded")){fm.classList.remove("expanded");btn.textContent="⛶ Expandir";}
    else{fm.classList.add("expanded");btn.textContent="⊡ Recolher";}
  }
  document.getElementById("fov").addEventListener("click",function(e){if(e.target.id==="fov")closeF();});

  var dt;
  document.getElementById("mc").addEventListener("input",function(){
    if(fk) localStorage.setItem(fk+"__html",this.value);
    clearTimeout(dt);var v=this.value;
    dt=setTimeout(function(){upPrev(v);},400);
  });
  document.getElementById("fi").addEventListener("input",function(){
    if(fk) localStorage.setItem(fk+"__flow",this.value);
    rnFlow(this.value);
  });
  function upPrev(html){
    document.getElementById("mf").srcdoc=html||'<body style="display:flex;align-items:center;justify-content:center;height:100vh;color:#ccc;font-family:sans-serif;font-size:13px">Cole seu HTML no editor ←</body>';
  }
  function rnFlow(txt){
    var el=document.getElementById("fr"),steps=txt.trim().split(">").map(function(s){return s.trim();}).filter(Boolean);
    if(!steps.length){el.innerHTML="";return;}
    var h="";
    for(var i=0;i<steps.length;i++){
      h+='<div class="fs">'+e(steps[i])+'</div>';
      if(i<steps.length-1) h+='<div class="fa">›</div>';
    }
    el.innerHTML=h;
  }

  document.addEventListener("keydown",function(ev){
    if(ev.key!=="Escape") return;
    if(document.getElementById("fov").classList.contains("open")) closeF(); else closeI();
  });

  function lc(k,f,d){var v=localStorage.getItem("rm__"+k+"__"+f);return v!==null?v==="true":!!d;}
  function sc(k,f,v){localStorage.setItem("rm__"+k+"__"+f,String(v));}
  function e(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

  renderPage();
  renderSb();
</script>
</body>
</html>
